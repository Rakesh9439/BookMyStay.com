server:
  port: 8087

spring:
  application:
    name: TRANSLATION-SERVICE
  datasource:
    url: jdbc:mysql://localhost:3306/translation-service_db
    username: root
    password: rakesh@#1997
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  boot:
    admin:
      client:
        url: http://localhost:8085  # Admin Server URL

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"   # expose all actuator endpoints
  endpoint:
    health:
      show-details: always

  tracing:
    sampling:
      probability: 1.0   # trace all requests (dev purpose)

    zipkin:
      tracing:
        endpoint: http://localhost:9411/api/v2/spans
